<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZonAI · Intelligence foncière Mauricie</title>
    <meta name="description" content="Redirection vers le site live de ZonAI." />
    <link rel="canonical" href="https://zonai.vercel.app/" />
    <meta http-equiv="refresh" content="0; url=https://zonai.vercel.app/" />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0; padding: 0; min-height: 100vh;
        background: #F4F4F2; color: #0E1116;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex; align-items: center; justify-content: center;
        text-align: center;
      }
      main { max-width: 28rem; padding: 2rem; }
      .mark { width: 80px; height: 80px; margin: 0 auto 1.5rem; display: block; }
      h1 {
        font-size: 1.5rem; font-weight: 600; letter-spacing: -0.015em;
        margin: 0 0 0.75rem;
      }
      h1 .accent { color: #054C36; }
      p { color: #5E646C; margin: 0 0 1.5rem; line-height: 1.5; }
      a {
        display: inline-block; padding: 0.65rem 1.25rem;
        background: #0E1116; color: #F4F4F2;
        border-radius: 999px; text-decoration: none; font-weight: 500;
        font-size: 0.9rem;
        transition: background 0.2s ease;
      }
      a:hover { background: #054C36; }
      footer { margin-top: 2rem; font-size: 0.75rem; color: #9CA0A6; }
    </style>
  </head>
  <body>
    <main>
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
        <g transform="rotate(45 50 50)">
          <rect x="8"  y="8"  width="24" height="24" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="36" y="10" width="20" height="20" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="60" y="8"  width="24" height="24" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="6"  y="38" width="22" height="18" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="36" y="36" width="24" height="24" rx="4" fill="#0A6E4F"/>
          <rect x="64" y="38" width="22" height="20" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="10" y="64" width="22" height="22" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="38" y="66" width="18" height="20" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
          <rect x="60" y="64" width="24" height="22" rx="4" fill="#E8E5DE" stroke="#D6D2C8" stroke-width="0.6"/>
        </g>
      </svg>
      <h1>Zon<span class="accent">AI</span></h1>
      <p>Le site live est hébergé sur Vercel. Redirection en cours…</p>
      <a href="https://zonai.vercel.app/">Ouvrir zonai.vercel.app</a>
      <footer>github.com/KAWSIMLARK/ZonAi</footer>
    </main>
  </body>
